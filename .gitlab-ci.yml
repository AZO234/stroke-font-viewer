# GitLab Pages への自動デプロイ
# https://<username>.gitlab.io/<project-name>/ でアクセス可能

image: node:20

variables:
  PNPM_VERSION: "10"

stages:
  - build
  - deploy

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/

before_script:
  - corepack enable
  - corepack prepare pnpm@${PNPM_VERSION} --activate
  - pnpm config set store-dir .pnpm-store

build:
  stage: build
  script:
    - pnpm install --frozen-lockfile
    # GitLab Pages は /<project-path>/ 以下で配信される
    - VITE_BASE=/${CI_PROJECT_PATH#*/}/ pnpm build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pages:
  stage: deploy
  script:
    # GitLab Pages は public/ ディレクトリを配信する
    - mv dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: production
    url: https://$CI_PAGES_DOMAIN/$CI_PROJECT_NAME
